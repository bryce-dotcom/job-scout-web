<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    <!-- Allow pinch-zoom up to 5x. Previously maximum-scale=1 + user-scalable=no
         was blocking users from zooming in to see content that overflowed the
         viewport on phones (Alayda couldn't see right half of JobDetail on her
         iPhone and couldn't pinch-zoom to reach it). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <!-- Also include the modern name that replaces apple-mobile-web-app-capable -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#5a6349" />
    <script>
      (function(){
        var p = location.pathname;
        var href = '/manifest.json';
        if (p.indexOf('/agent/lenard-ut-rmp') === 0) {
          href = '/manifest-lenard-ut.json';
          document.title = 'Lenard UT RMP';
        } else if (p.indexOf('/agent/lenard-az-srp') === 0) {
          href = '/manifest-lenard.json';
          document.title = 'Lenard AZ SRP';
        }
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = href;
        document.head.appendChild(link);
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Job Scout</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
